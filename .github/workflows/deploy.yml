name: Build and Deploy to Yegara

on:
  push:
    branches:
      - main # Change this to your main branch name

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Match your Yegara Node.js version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PRIVATE_STANDALONE: true

      - name: Prepare Deploy Runtime
        run: |
          rm -rf deploy_out
          mkdir -p deploy_out

          # Copy full Next standalone runtime to deployment folder
          cp -r .next/standalone/* deploy_out/
          cp -r public deploy_out/public
          cp -r scripts deploy_out/scripts
          cp app.js deploy_out/app.js

          # Ensure static assets are present at runtime (/_next/static/*)
          mkdir -p deploy_out/.next
          cp -r .next/static deploy_out/.next/static

          # Fix Passenger Unix Socket PORT Bug in standalone Next.js
          sed -i 's/parseInt(process.env.PORT, 10)/process.env.PORT/g' deploy_out/server.js

          # We bundle the standalone modules directly to bypass cPanel's flakey NPM install
          # and the symlink constraint. We rename it so cPanel doesn't delete it or complain.
          mv deploy_out/node_modules deploy_out/standalone_modules

          # Quick sanity check in CI logs
          ls -la deploy_out
          ls -la deploy_out/.next

      - name: Deploy to Deploy Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_out
          branch: deploy
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
